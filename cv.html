    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        

        .cv-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .cv-heading {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .cv-toolbar .button-59 {
            margin: 0;
        }

        .pdf-container {
            width: 100%;
            /* Fill the viewport minus nav, toolbar, and spacing */
            height: calc(100vh - 15rem);
            min-height: 480px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background: white;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        object {
            width: 100%;
            height: 100%;
        }

        .fallback {
            padding: 20px;
            text-align: center;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
        }

        .fallback p {
            margin: 10px 0;
            color: #333;
            font-size: 16px;
        }
        .false-div-1 {
            height: 2rem;
        }
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background-color: #0066cc;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .download-btn:hover {
            background-color: #0052a3;
        }

        
    </style>
